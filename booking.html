<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Booking</title>
    <style>
        body {
            background: linear-gradient(to right, #36d1dc, #5b86e5);
            min-height: 100vh;
        }
        .card {
            border-radius: 15px;
            border: none;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">GoTravel</a>
        <div class="navbar-nav">
            <a class="nav-link" href="home.html">Home</a>
            <a class="nav-link" href="gallery.html">Gallery</a>
            <a class="nav-link active" href="booking.html">Booking</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="card p-4 shadow-lg mx-auto" style="max-width: 450px;">
        <h3 class="text-center mb-4">Booking Form</h3>

        <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" id="name" class="form-control" placeholder="Enter your name">
        </div>

        <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input type="email" id="email" class="form-control" placeholder="name@gmail.com">
        </div>

        <div class="mb-3">
            <label class="form-label d-block">Gender:</label>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="gender" id="male" value="male">
                <label class="form-check-label" for="male">Male</label>
            </div>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="gender" id="female" value="female">
                <label class="form-check-label" for="female">Female</label>
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label">Number of Days:</label>
            <input type="range" class="form-range" min="1" max="30" id="days">
        </div>

        <button onclick="bookNow()" class="btn btn-success w-100 py-2 fw-bold">Book Now</button>
    </div>
</div>

<script>
function bookNow(){
    let n = document.getElementById("name").value;
    let e = document.getElementById("email").value;

    if (n == "" || e == "") {
    alert("Please fill in all the information!");
} else {
    alert("Booking successful! Thank you " + n);
}
}
</script>

</body>
</html>
