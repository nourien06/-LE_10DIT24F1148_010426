<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Gallery</title>
    <style>
        body {
            background-color: rgb(151, 51, 86);
        }
        /* Khas untuk seragamkan saiz gambar */
        .gallery-img {
            width: 100%;
            height: 200px; /* Tukar ikut suka, contoh 200px atau 250px */
            object-fit: cover; /* Supaya gambar tak penyek */
            border-radius: 15px;
            transition: 0.3s;
        }
        /* Tambah efek sikit bila letak mouse */
        .gallery-img:hover {
            transform: scale(1.05);
            cursor: pointer;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand">GoTravel</a>
        <div>
            <a class="nav-link d-inline text-white mx-2" href="home.html">Home</a>
            <a class="nav-link d-inline text-white active mx-2" href="gallery.html">Gallery</a>
            <a class="nav-link d-inline text-white mx-2" href="booking.html">Booking</a>
        </div>
    </div>
</nav>

<div class="container mt-5 text-center text-white">
    <h2 class="mb-4">My Travel Gallery 🌍</h2>

    <div class="row g-4"> <div class="col-md-4 col-sm-6">
            <img src="beach.jpg" class="gallery-img shadow" title="Beach">
        </div>

        <div class="col-md-4 col-sm-6">
            <img src="city.jpg" class="gallery-img shadow" title="City">
        </div>

        <div class="col-md-4 col-sm-6">
            <img src="mountain.jpg" class="gallery-img shadow" title="Mountain">
        </div>
    </div>
</div>

</body>
</html>
