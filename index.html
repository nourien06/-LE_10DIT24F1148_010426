<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<title>GoTravel</title>
</head>

<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center vh-100">
  
  <div class="card p-4 shadow" style="width:300px;">
    <h3 class="text-center mb-3">GoTravel</h3>

    <input type="text" id="user" class="form-control mb-2" placeholder="Username">
    <input type="password" id="pass" class="form-control mb-3" placeholder="Password">

    <button onclick="login()" class="btn btn-primary w-100">Login</button>
  </div>

</div>

<script>
function login(){
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  if(u=="" || p==""){
    alert("Isi semua!");
  } else {
    window.location="home.html";
  }
}
</script>

</body>
</html>
